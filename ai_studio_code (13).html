<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABVP Tripura University Unit | System Update</title>
    <!-- Modern Sans-serif Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff6f00;
            --secondary: #ff9100;
            --bg-gradient: radial-gradient(at 0% 0%, hsla(28,100%,74%,1) 0, transparent 50%), 
                           radial-gradient(at 50% 0%, hsla(34,100%,76%,1) 0, transparent 50%), 
                           radial-gradient(at 100% 0%, hsla(22,100%,77%,1) 0, transparent 50%);
            --glass: rgba(255, 255, 255, 0.85);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: #fff5e6;
            background-image: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #1d1d1f;
            padding: 20px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 32px;
            padding: 60px 40px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            width: 140px;
            height: 140px;
            margin: 0 auto 30px;
            border-radius: 50%;
            padding: 5px;
            background: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
            color: #111;
        }

        .status-badge {
            display: inline-block;
            background: rgba(255, 111, 0, 0.1);
            color: var(--primary);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #4a4a4a;
            margin-bottom: 30px;
        }

        .loader-bar {
            width: 100%;
            height: 6px;
            background: #eee;
            border-radius: 10px;
            margin: 40px 0;
            overflow: hidden;
            position: relative;
        }

        .loader-progress {
            width: 40%;
            height: 100%;
            background: var(--primary);
            border-radius: 10px;
            position: absolute;
            animation: moveProgress 2s infinite ease-in-out;
        }

        @keyframes moveProgress {
            0% { left: -40%; }
            100% { left: 100%; }
        }

        .email-btn {
            display: inline-flex;
            align-items: center;
            background: #111;
            color: #fff;
            padding: 14px 28px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-top: 10px;
        }

        .email-btn:hover {
            transform: translateY(-2px);
            background: #333;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .email-btn svg {
            margin-right: 10px;
        }

        .footer-text {
            margin-top: 40px;
            font-size: 0.85rem;
            color: #888;
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 25px;
        }

        strong {
            color: #000;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-container">
        <!-- Logo Image -->
        <img src="https://res.cloudinary.com/dfyuuze2y/image/upload/v1783166741/ABVPLOGO.png" alt="ABVP Logo">
    </div>

    <div class="status-badge">System Maintenance</div>

    <h1>Experience is Improving</h1>
    
    <p>
        The official portal of <strong>ABVP Tripura University Unit</strong> is currently evolving. We are deploying new features to serve our student community better.
    </p>

    <div class="loader-bar">
        <div class="loader-progress"></div>
    </div>

    <a href="mailto:contact@abvptu.indevs.in" class="email-btn">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
        </svg>
        Emergency Contact
    </a>

    <div class="footer-text">
        &copy; 2026 ABVP Tripura University Unit<br>
        Crafting a better digital experience for students.
    </div>
</div>

</body>
</html>
