<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ABVP TU | Instagram Post</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#eef3ff,#ffffff,#f6f7fb);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.container{
    width:100%;
    max-width:700px;
}

.card{
    background:#fff;
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 15px 45px rgba(0,0,0,.15);
}

.header{
    background:linear-gradient(45deg,#405DE6,#833AB4,#C13584,#E1306C,#FD1D1D,#FCAF45);
    color:white;
    padding:22px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.profile{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo{
    width:55px;
    height:55px;
    border-radius:50%;
    background:white;
    color:#E1306C;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
}

.name{
    font-size:22px;
    font-weight:600;
}

.desc{
    font-size:13px;
    opacity:.9;
}

.follow{
    text-decoration:none;
    background:white;
    color:#E1306C;
    padding:10px 20px;
    border-radius:50px;
    font-weight:600;
    transition:.3s;
}

.follow:hover{
    transform:translateY(-2px);
}

.embed{
    padding:25px;
    background:#fafafa;
}

.instagram-media{
    margin:0 auto!important;
    width:100%!important;
    max-width:540px!important;
    min-width:326px!important;
    border-radius:16px!important;
}

.footer{
    text-align:center;
    padding:18px;
    background:white;
    color:#666;
    font-size:14px;
}

.footer a{
    color:#E1306C;
    text-decoration:none;
    font-weight:600;
}

@media(max-width:600px){

.header{
    flex-direction:column;
    gap:20px;
    text-align:center;
}

.profile{
    flex-direction:column;
}

.follow{
    width:100%;
    text-align:center;
}

.embed{
    padding:10px;
}

}
</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="header">

<div class="profile">

<div class="logo">📷</div>

<div>

<div class="name">Instagram Post</div>

<div class="desc">ABVP Tripura University</div>

</div>

</div>

<a class="follow"
href="https://www.instagram.com/raktimbhattacharjeeofficial/"
target="_blank">
Follow
</a>

</div>

<div class="embed">

<blockquote
class="instagram-media"
data-instgrm-captioned
data-instgrm-permalink="https://www.instagram.com/p/DaF6HF5E1dj/"
data-instgrm-version="14"
style="margin:auto;">
</blockquote>

</div>

<div class="footer">

View more on
<a href="https://www.instagram.com/raktimbhattacharjeeofficial/" target="_blank">
Instagram
</a>

</div>

</div>

</div>

<script async src="https://www.instagram.com/embed.js"></script>

</body>
</html>
